<!doctype html>
<html lang="en" ng-app="myApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <style>
      body {
        background-color: rgb(165, 87, 248);
      }
      .head {
        font-size: 30px;
        font-family: sans-serif;
        margin-top: 50px;
        font-weight: 600;
        /* color:rgb(91, 90, 90);
             */
        text-shadow: 0px 1px 1px rgb(147, 146, 146);
        color: white;
      }
      .table-body {
        margin-top: 50px;
      }

      td {
        padding: 5px;
        border: 3px solid white;
        color: white;
        width: 200px;
        text-align: center;
        font-size: 20px;
        min-height: 50px;
      }
      .options {
        display: flex;
        flex-direction: row;
        gap: 5px;
        width: 110px;
        font-size: 20px;
        text-align: center;
      }
      .td-option {
        width: 110px;
      }
      /* Mobile responsiveness */
      @media (max-width: 768px) {
        body {
          overflow-x: hidden;
        }
        .head {
          font-size: 24px;
          margin-top: 25px;
          padding: 0 10px;
        }
        .table-body {
          margin-top: 25px;
          margin-left: 10px;
          margin-right: 10px;
          overflow-x: auto;
          max-width: 100%;
          -webkit-overflow-scrolling: touch;
        }
        .table-body center {
          display: block;
          overflow-x: auto;
        }
        td {
          padding: 8px;
          font-size: 14px;
          min-width: 120px;
          width: auto;
        }
        .options {
          flex-wrap: wrap;
          width: auto;
          min-width: 80px;
        }
        .td-option {
          width: auto;
        }
      }
      @media (max-width: 480px) {
        .head {
          font-size: 20px;
        }
        td {
          padding: 6px;
          font-size: 12px;
          min-width: 100px;
        }
      }
    </style>
  </head>

  <body ng-controller="myCtrl">
    <div class="main">
      <div class="head">
        <center>Data</center>
      </div>
      <div class="table-body">
        <center>
          <table border="1">
            <tr>
              <td>Name</td>
              <td>Email</td>
              <td>Phone</td>
              <td>Address</td>
              <td>Gender</td>
              <td>Course</td>
              <td class="td-option">Options</td>
            </tr>
            <tr ng-repeat="data in user_data">
              <td>{{data.fullname}}</td>
              <td>{{data.email}}</td>
              <td>{{data.phone}}</td>
              <td>{{data.address}}</td>
              <td>{{data.gender}}</td>
              <td>{{data.course}}</td>
              <td class="options">
                <button
                  style="
                    background-color: rgb(79, 168, 252);
                    font-size: small;
                    color: white;
                    font-weight: 900;
                    border: 2px solid;
                  "
                  ng-click="move_update(data._id)"
                  ng-disabled="!isOwner(data)"
                  ng-show="isOwner(data)"
                >
                  <img
                    src="https://cdn-icons-png.flaticon.com/128/10336/10336582.png"
                    width="30"
                    height="30"
                  />
                </button>
                <button
                  style="
                    background-color: rgb(249, 21, 21);
                    font-size: small;
                    color: white;
                    font-weight: 900;
                    border: 2px solid;
                  "
                  ng-click="delete_user(data._id)"
                  ng-disabled="!isOwner(data)"
                  ng-show="isOwner(data)"
                >
                  <img
                    src="https://cdn-icons-png.flaticon.com/128/9790/9790368.png"
                    width="30"
                    height="20"
                  />
                </button>
              </td>
            </tr>
          </table>
        </center>
      </div>
    </div>
    <script>
      angular
        .module("myApp", [])
        .controller("myCtrl", function ($scope, $http, $interval) {
          $scope.user_data = {};
          $scope.currentUserEmail = localStorage.getItem("currentUserEmail");
          let lastDataSnapshot = "";
          let poller = null;
          $scope.isOwner = function (data) {
            return !!$scope.currentUserEmail && data.email === $scope.currentUserEmail;
          };
          $scope.get_data = function () {
            $http
              .get("https://angularjs-crud-operation.onrender.com/form/view")
              .then((res) => {
                console.log(res.data.data);
                const latestData = Array.isArray(res.data.data) ? res.data.data : [];
                const nextSnapshot = JSON.stringify(latestData);
                if (nextSnapshot !== lastDataSnapshot) {
                  lastDataSnapshot = nextSnapshot;
                  $scope.user_data = latestData;
                }
              })
              .catch((err) => {
                console.log(err.data);
              });
          };
          $scope.delete_user = function (id) {
            $http
              .delete(`https://angularjs-crud-operation.onrender.com/form/delete/${id}`, {
                headers: {
                  "x-user-email": $scope.currentUserEmail || "",
                },
              })
              .then((res) => {
                console.log(res.data);
                $scope.get_data();
              });
          };
          $scope.move_update = function(id){
            const selectedUser = $scope.user_data.find((item) => item._id === id);
            if (!selectedUser || !$scope.isOwner(selectedUser)) {
              return;
            }
            window.location.href = `update.html?id=${id}`;
          }
          $scope.get_data();
          poller = $interval($scope.get_data, 4000);
          $scope.$on("$destroy", function () {
            if (poller) {
              $interval.cancel(poller);
            }
          });
        });
    </script>
  </body>
</html>
