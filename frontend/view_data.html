<!doctype html>
<html lang="en" ng-app="myApp">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
    <style>
      body {
        background-color: rgb(165, 87, 248);
      }
      .head {
        font-size: 30px;
        font-family: sans-serif;
        margin-top: 50px;
        font-weight: 600;
        /* color:rgb(91, 90, 90);
             */
        text-shadow: 0px 1px 1px rgb(147, 146, 146);
        color: white;
      }
      .table-body {
        margin-top: 50px;
      }

      td {
        padding: 5px;
        border: 3px solid white;
        color: white;
        width: 200px;
        text-align: center;
        font-size: 20px;
        min-height: 50px;
      }
      .options {
        display: flex;
        flex-direction: row;
        gap: 5px;
        width: 110px;
        font-size: 20px;
        text-align: center;
      }
      .td-option {
        width: 110px;
      }
    </style>
  </head>

  <body ng-controller="myCtrl">
    <div class="main">
      <div class="head">
        <center>Data</center>
      </div>
      <div class="table-body">
        <center>
          <table border="1">
            <tr>
              <td>Name</td>
              <td>Email</td>
              <td>Phone</td>
              <td>Address</td>
              <td>Gender</td>
              <td>Course</td>
              <td class="td-option">Options</td>
            </tr>
            <tr ng-repeat="data in user_data">
              <td>{{data.fullname}}</td>
              <td>{{data.email}}</td>
              <td>{{data.phone}}</td>
              <td>{{data.address}}</td>
              <td>{{data.gender}}</td>
              <td>{{data.course}}</td>
              <td class="options">
                <button
                  style="
                    background-color: rgb(79, 168, 252);
                    font-size: small;
                    color: white;
                    font-weight: 900;
                    border: 2px solid;
                  "
                  ng-click="move_update(data._id)"
                >
                  <img
                    src="https://cdn-icons-png.flaticon.com/128/10336/10336582.png"
                    width="30"
                    height="30"
                  />
                </button>
                <button
                  style="
                    background-color: rgb(249, 21, 21);
                    font-size: small;
                    color: white;
                    font-weight: 900;
                    border: 2px solid;
                  "
                  ng-click="delete_user(data._id)"
                >
                  <img
                    src="https://cdn-icons-png.flaticon.com/128/9790/9790368.png"
                    width="30"
                    height="20"
                  />
                </button>
              </td>
            </tr>
          </table>
        </center>
      </div>
    </div>
    <script>
      angular
        .module("myApp", [])
        .controller("myCtrl", function ($scope, $http) {
          $scope.user_data = {};
          $scope.get_data = function () {
            $http
              .get("https://angularjs-crud-operation.onrender.com/form/view")
              .then((res) => {
                console.log(res.data.data);
                $scope.user_data = res.data.data;
              })
              .catch((err) => {
                console.log(err.data);
              });
          };
          $scope.delete_user = function (id) {
            $http
              .delete(`https://angularjs-crud-operation.onrender.com/form/delete/${id}`)
              .then((res) => {
                console.log(res.data);
                $scope.get_data();
              });
          };
          $scope.move_update = function(id){
  window.location.href = `update.html?id=${id}`;
}
          $scope.get_data();
        });
    </script>
  </body>
</html>
